<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Ponto</title>

<style>
*, *::before, *::after{ box-sizing:border-box; margin:0; padding:0; }
:root{
  --bg:#F5F4F0; --surface:#FFFFFF; --border:#E2E0D8; --text:#1A1917; --muted:#7A786F;
  --accent:#1A1917; --green:#1B7A4A; --green-bg:#EAF5EF; --amber:#9A5A00;
  --amber-bg:#FEF3E2; --red:#C0392B; --red-bg:#FDEEEC;
  --font:'DM Mono','Courier New',monospace; --font-ui:'DM Sans',system-ui,sans-serif;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,.07);
}
body{
  font-family:var(--font-ui); background:var(--bg); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:1rem; color:var(--text);
}
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow); width:100%; max-width:420px; padding:2rem;
}
.logo{ display:flex; align-items:center; gap:10px; margin-bottom:1.8rem; }
.logo-icon{
  width:36px; height:36px; border-radius:8px; background:var(--accent); color:white;
  display:flex; align-items:center; justify-content:center;
}
.logo-title{ font-size:15px; font-weight:700; color:var(--text); }
.logo-sub{ font-size:12px; color:var(--muted); }
.form-group{ margin-bottom:1rem; }
label{
  display:block; margin-bottom:6px; font-size:12px; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:.04em;
}
input[type=text], input[type=password]{
  width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:var(--radius);
  background:var(--bg); font-size:15px; font-family:var(--font); outline:none;
}
input:focus{ border-color:var(--accent); background:var(--surface); }
.btn{
  width:100%; padding:12px; border:none; border-radius:var(--radius); cursor:pointer;
  font-size:14px; font-weight:700; transition:.15s; margin-top:10px;
}
.btn:hover{ opacity:.9; }
.btn:disabled{ opacity:.55; cursor:not-allowed; }
.btn-dark{ background:var(--accent); color:white; }
.btn-ghost{ background:transparent; color:var(--muted); border:1px solid var(--border); }
.error{ display:none; margin-bottom:12px; color:var(--red); font-size:13px; }
.small{ margin-top:14px; color:var(--muted); font-size:12px; line-height:1.4; }
</style>

</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⏰</div>
    <div>
      <div class="logo-title">Registro de Ponto</div>
      <div class="logo-sub">Controle de jornada</div>
    </div>
  </div>

  <div class="error" id="login-error">Informe a matrícula.</div>

  <div class="form-group">
    <label for="inp-matricula">Matrícula</label>
    <input type="text" id="inp-matricula" placeholder="Ex: EMP001" autocomplete="username">
  </div>

  <div class="form-group">
    <label for="inp-nome">Nome</label>
    <input type="text" id="inp-nome" placeholder="Seu nome" autocomplete="name">
  </div>

  <button class="btn btn-dark" id="btn-login" type="button">Entrar</button>
  <button class="btn btn-ghost" id="btn-supervisor" type="button">Acesso supervisor →</button>

  <div class="small">
    A dashboard só abre depois de uma sessão ativa confirmada pelo servidor.
  </div>
</div>

<script>
const API = "http://extraordinary-reverence-production-324c.up.railway.app";

const $ = (id) => document.getElementById(id);

function mostrarErro(msg){
  $("login-error").style.display = "block";
  $("login-error").textContent = msg;
}

function limparSessaoAntiga(){
  localStorage.removeItem("ponto_session");
}

async function testarServidor(){
  const res = await fetch(`${API}/api/health`);
  if(!res.ok) throw new Error("Servidor indisponível");
}

async function fazerLogin(){
  const mat = $("inp-matricula").value.trim();
  const nome = $("inp-nome").value.trim();
  const btn = $("btn-login");

  if(!mat){
    mostrarErro("Informe a matrícula.");
    return;
  }

  btn.disabled = true;
  $("login-error").style.display = "none";

  try{
    await testarServidor();

    const res = await fetch(`${API}/api/login`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        matricula: mat,
        nome: nome || mat
      })
    });

    const data = await res.json().catch(() => null);

    if(!res.ok || !data?.sessao_id){
      throw new Error(data?.detail || "Falha no login");
    }

    localStorage.setItem("ponto_session", JSON.stringify({
      matricula: data.matricula || mat,
      nome: data.nome || nome || mat,
      sessaoId: data.sessao_id,
      loginEm: data.login_em
    }));

    window.location.href = "dashboard.html";
  }catch(e){
    console.error(e);
    limparSessaoAntiga();
    mostrarErro("Erro ao conectar/logar. Confira se o uvicorn está rodando em http://127.0.0.1:8000.");
  }finally{
    btn.disabled = false;
  }
}

$("btn-login").addEventListener("click", fazerLogin);
$("btn-supervisor").addEventListener("click", () => {
  window.location.href = "supervisor.html";
});

document.addEventListener("keydown", (ev) => {
  if(ev.key === "Enter") fazerLogin();
});
</script>
</body>
</html>
