<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Ponto</title>
<style>
body{
    margin:0; font-family:Arial, sans-serif; background:#f4f4f4;
    display:flex; justify-content:center; align-items:center; min-height:100vh;
}
.card{ width:350px; background:white; padding:30px; border-radius:14px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
.nome{ font-size:22px; font-weight:bold; }
.matricula{ color:gray; margin-bottom:15px; }
.status{ display:inline-block; padding:6px 10px; border-radius:999px; background:#eee; margin:8px 0 20px; font-size:13px; }
.timer-box{ margin-bottom:20px; }
.label{ font-size:14px; color:#666; }
.timer{ font-size:34px; font-weight:bold; font-family:"Courier New", monospace; }
button{ width:100%; padding:14px; border:none; border-radius:10px; margin-top:12px; cursor:pointer; font-size:16px; transition: opacity 0.2s; }
button:disabled{ opacity: 0.5; cursor: not-allowed; }
#btn-pausa{ background:#ffcc66; }
.logout{ background:#ffb3b3; }
.erro{ color:#b00020; margin-bottom:12px; display:none; font-size:14px; }
.loading{ color:#666; font-size:14px; }
</style>
</head>
<body>

<div class="card">
    <div class="loading" id="loading">Validando sessão...</div>
    <div id="conteudo" style="display:none">
        <div class="erro" id="erro"></div>
        <div class="nome" id="nome"></div>
        <div class="matricula" id="matricula"></div>
        <div id="data-atual"></div>
        <div class="status" id="status">Ativo</div>

        <div class="timer-box">
            <div class="label">Tempo Logado</div>
            <div class="timer" id="tempo-logado">00:00:00</div>
        </div>

        <div class="timer-box">
            <div class="label">Tempo em Pausa</div>
            <div class="timer" id="tempo-pausa">00:00:00</div>
        </div>

        <button id="btn-pausa" type="button">Iniciar pausa</button>
        <button class="logout" id="btn-logout" type="button">Encerrar jornada</button>
    </div>
</div>

<script>
const API = "http://extraordinary-reverence-production-324c.up.railway.app";
const $ = (id) => document.getElementById(id);

let session = null;
let servidorEstado = null;
let emPausa = false;
let requisicaoEmAndamento = false;
let tick = null;

function formatar(seg) {
    seg = Math.max(0, Math.floor(seg || 0));
    const h = String(Math.floor(seg / 3600)).padStart(2, '0');
    const m = String(Math.floor((seg % 3600) / 60)).padStart(2, '0');
    const s = String(seg % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
}

function irParaLogin() {
    localStorage.removeItem("ponto_session");
    window.location.replace("index.html");
}

function mostrarErro(msg) {
    $("erro").style.display = "block";
    $("erro").textContent = msg;
}

function lerSessaoLocal() {
    const raw = localStorage.getItem("ponto_session");
    if (!raw) return null;

    try {
        const obj = JSON.parse(raw);
        if (!obj.matricula || !obj.sessaoId) return null;
        return obj;
    } catch {
        return null;
    }
}

async function validarSessao() {
    session = lerSessaoLocal();
    if (!session) {
        irParaLogin();
        return;
    }

    const url = `${API}/api/sessao/${encodeURIComponent(session.sessaoId)}?matricula=${encodeURIComponent(session.matricula)}`;
    const res = await fetch(url);

    if (!res.ok) {
        irParaLogin();
        return;
    }

    servidorEstado = await res.json();

    if (servidorEstado.status !== "ativo" && servidorEstado.status !== "em_pausa") {
        irParaLogin();
        return;
    }

    emPausa = !!servidorEstado.em_pausa;

    session.nome = servidorEstado.nome || session.nome || session.matricula;
    session.loginEm = servidorEstado.login_em;
    localStorage.setItem("ponto_session", JSON.stringify(session));

    inicializarTela();
}

function calcularTempoAgora() {
    const loginMs = Date.parse(servidorEstado.login_em);
    const agoraMs = Date.now();

    let totalLogado = Math.floor((agoraMs - loginMs) / 1000);
    let pausa = servidorEstado.total_pausa_seg || 0;

    // O backend já conta pausa aberta quando consultado.
    // Entre uma consulta e outra, se estiver em pausa, somamos a diferença local.
    if (emPausa && servidorEstado._ultimaConsultaMs) {
        pausa += Math.floor((agoraMs - servidorEstado._ultimaConsultaMs) / 1000);
    }

    return {
        totalLogado,
        totalPausa: Math.min(pausa, totalLogado)
    };
}

function atualizarTela() {
    const t = calcularTempoAgora();
    $("tempo-logado").textContent = formatar(t.totalLogado);
    $("tempo-pausa").textContent = formatar(t.totalPausa);
    sincronizarBotao();
}

function sincronizarBotao() {
    const btn = $("btn-pausa");
    const status = $("status");

    if (emPausa) {
        btn.innerText = "Terminar pausa";
        btn.style.background = "#b7f5c5";
        status.textContent = "Em pausa";
        status.style.background = "#fff1cc";
    } else {
        btn.innerText = "Iniciar pausa";
        btn.style.background = "#ffcc66";
        status.textContent = "Ativo";
        status.style.background = "#dff5e6";
    }
}

function inicializarTela() {
    $("loading").style.display = "none";
    $("conteudo").style.display = "block";

    $("nome").textContent = session.nome;
    $("matricula").textContent = session.matricula;
    $("data-atual").textContent = new Date().toLocaleDateString("pt-BR", {
        weekday: "long", day: "2-digit", month: "2-digit", year: "numeric"
    });

    servidorEstado._ultimaConsultaMs = Date.now();

    atualizarTela();
    if (tick) clearInterval(tick);
    tick = setInterval(atualizarTela, 1000);

    // Ressincroniza com o servidor quando a aba volta ao foco.
    document.addEventListener("visibilitychange", async () => {
        if (!document.hidden) await ressincronizar();
    });
}

async function ressincronizar() {
    try {
        const url = `${API}/api/sessao/${encodeURIComponent(session.sessaoId)}?matricula=${encodeURIComponent(session.matricula)}`;
        const res = await fetch(url);
        if (!res.ok) {
            irParaLogin();
            return;
        }
        servidorEstado = await res.json();
        servidorEstado._ultimaConsultaMs = Date.now();
        emPausa = !!servidorEstado.em_pausa;
        atualizarTela();
    } catch (err) {
        console.error(err);
    }
}

async function togglePausa() {
    if (requisicaoEmAndamento) return;

    requisicaoEmAndamento = true;
    const btn = $("btn-pausa");
    btn.disabled = true;

    const novoEstado = !emPausa;

    try {
        const res = await fetch(`${API}/api/evento`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                matricula: session.matricula,
                sessao_id: Number(session.sessaoId),
                tipo: novoEstado ? "PAUSA_INICIO" : "PAUSA_FIM"
            })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok) {
            throw new Error(data?.detail || `Erro ${res.status}`);
        }

        servidorEstado = data;
        servidorEstado._ultimaConsultaMs = Date.now();
        emPausa = !!data.em_pausa;
        atualizarTela();

    } catch (err) {
        console.error(err);
        mostrarErro("Não consegui registrar a pausa. Confere se o servidor está rodando.");
    } finally {
        btn.disabled = false;
        requisicaoEmAndamento = false;
    }
}

async function logout() {
    $("btn-logout").disabled = true;
    try {
        await fetch(`${API}/api/logout`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                matricula: session.matricula,
                sessao_id: Number(session.sessaoId)
            })
        });
    } catch (err) {
        console.error(err);
    } finally {
        localStorage.removeItem("ponto_session");
        window.location.replace("index.html");
    }
}

$("btn-pausa").addEventListener("click", togglePausa);
$("btn-logout").addEventListener("click", logout);

validarSessao().catch((err) => {
    console.error(err);
    irParaLogin();
});
</script>
</body>
</html>
